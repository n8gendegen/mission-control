name: Auto-assign Mission Control backlog

on:
  schedule:
    - cron: "0 * * * *" # top of every hour
  workflow_dispatch:

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AUTO_ASSIGN_LIMIT: ${{ vars.AUTO_ASSIGN_LIMIT }}
      AUTO_ASSIGN_MAX_ACTIVE: ${{ vars.AUTO_ASSIGN_MAX_ACTIVE }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      BUILDER_GITHUB_TOKEN: ${{ secrets.GITHUB_BOUNTY_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decide whether this window should run
        id: window
        run: |
          tz="America/New_York"
          hour=$(TZ=$tz date +%H)

          should_run="true"
          mode="sleep"

          if [ "$hour" -ge 6 ] && [ "$hour" -lt 22 ]; then
            mode="awake"
          fi

          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"
          echo "Local time: $(TZ=$tz date) | should_run=${should_run} | mode=${mode}"

      - name: Setup Node.js
        if: steps.window.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mission-control/package-lock.json

      - name: Install dependencies
        if: steps.window.outputs.should_run == 'true'
        run: npm ci
        working-directory: mission-control

      - name: Run auto-assign worker
        if: steps.window.outputs.should_run == 'true'
        run: npm run worker:auto-assign
        working-directory: mission-control

      - name: Run agent dispatcher
        if: steps.window.outputs.should_run == 'true'
        run: npm run worker:dispatch-agent
        working-directory: mission-control

      - name: Run Splitter agent runner
        if: steps.window.outputs.should_run == 'true' && env.OPENAI_API_KEY != ''
        run: npm run worker:agent-runner -- --agent Splitter --limit 3
        working-directory: mission-control

      - name: Configure git identity for builder harness
        if: steps.window.outputs.should_run == 'true'
        run: |
          git config user.name "Mission Control Builder"
          git config user.email "builder@users.noreply.github.com"
        working-directory: mission-control

      - name: Run builder harness session
        if: steps.window.outputs.should_run == 'true'
        env:
          BUILDER_GITHUB_TOKEN: ${{ secrets.GITHUB_BOUNTY_TOKEN }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run worker:builder-session -- --limit 1
        working-directory: mission-control

      - name: Annotate completion
        if: steps.window.outputs.should_run == 'true'
        run: |
          echo "Ran auto-assign worker during ${{ steps.window.outputs.mode }} window"
