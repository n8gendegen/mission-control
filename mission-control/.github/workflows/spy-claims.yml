name: Spy Claims

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  claims:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      GITHUB_BOUNTY_TOKEN: ${{ secrets.GITHUB_BOUNTY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run worker:spy-claims
