name: Approval Dispatcher

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run worker:approval-dispatcher
